services:
  apptaro_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apptaro_backend
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "${HOST_PORT:-8000}:8000"
    volumes:
      - ./data:/data
      - ./templates:/app/runtime/templates
      - ./tarot:/app/runtime/tarot
      - ./temp:/app/runtime/temp
      - ./logs:/app/logs

  apptaro_admin_bot:
    build:
      context: .
      dockerfile: ./telegram_admin_bot/Dockerfile
    container_name: apptaro_admin_bot
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      ADMIN_DATABASE_PATH: /data/appslides.db
      ADMIN_TEMPLATES_DIR: /templates
      ADMIN_TEMP_DIR: /temp
    volumes:
      - ./data:/data
      - ./templates:/templates
      - ./temp:/temp
